{% extends "master.html" %}

{% block content %}
<section class="table-section">
    <h2>Listado de Edificios</h2>
    <p style="margin-bottom: 20px;">Número de edificios registrados: <span class="yellow">{{ numero_edificios }}</span></p>

    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Dirección</th>
                <th>Ciudad</th>
                <th>Tipo</th>
            </tr>
        </thead>
        <tbody>
            {% for e in edificios %}
            <tr>
                <td>{{ e.nombre }}</td>
                <td>{{ e.direccion }}</td>
                <td>{{ e.ciudad }}</td>
                <td>{{ e.tipo }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</section>
{% endblock %}
