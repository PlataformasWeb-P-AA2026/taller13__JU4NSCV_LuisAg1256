{% extends "master.html" %}

{% block content %}
<h2>Crear Departamento</h2>
<form method="POST" action="{{ url_for('crear_departamento') }}">
    <label for="nombre_propietario">Nombre del Propietario:</label><br>
    <input type="text" id="nombre_propietario" name="nombre_propietario" required><br><br>

    <label for="costo">Costo:</label><br>
    <input type="number" step="0.01" id="costo" name="costo" required><br><br>

    <label for="num_cuartos">Número de Cuartos:</label><br>
    <input type="number" id="num_cuartos" name="num_cuartos" required><br><br>

    <label for="edificio">Edificio:</label><br>
    <select id="edificio" name="edificio" required>
        <option value="">Seleccione un edificio</option>
        {% for e in edificios %}
        <option value="{{ e.url }}">{{ e.nombre }} - {{ e.ciudad }}</option>
        {% endfor %}
    </select><br><br>

    <input type="submit" value="Guardar Departamento">
</form>
{% endblock %}
